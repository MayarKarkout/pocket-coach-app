server {
    listen 443 ssl;
    server_name goodold-ideapad-s210-touch.tail3b74a6.ts.net;

    ssl_certificate /etc/nginx/certs/goodold-ideapad-s210-touch.tail3b74a6.ts.net.crt;
    ssl_certificate_key /etc/nginx/certs/goodold-ideapad-s210-touch.tail3b74a6.ts.net.key;

    location / {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
